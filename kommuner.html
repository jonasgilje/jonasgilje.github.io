<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="utf-8" />
<title>Kommunegrenser (Kartverket)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  body { margin: 0; }
  #map { width: 100vw; height: 100vh; }
</style>
</head>
<body>

<div id="map"></div>

<script>
// ---- 1. Hent kommunenummer fra URL ----
const params = new URLSearchParams(window.location.search);
const kommunerParam = params.get("kommuner");

if (!kommunerParam) {
  alert("Ingen kommunenummer funnet i URL-en.");
}

const kommunenummer = kommunerParam.split(",").map(x => x.trim());

// ---- 2. Lag kartet ----
const map = L.map('map').setView([63.5, 10], 5);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18,
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

// ---- 3. Last inn Kartverkets GeoJSON ----
fetch("kommuner.geojson")
  .then(r => r.json())
  .then(data => {
    const layer = L.geoJSON(data, {
      filter: f => kommunenummer.includes(f.properties.kommunenummer),
      style: {
        color: "#ff0000",
        weight: 2
      }
    }).addTo(map);

    if (layer.getLayers().length > 0) {
      map.fitBounds(layer.getBounds());
    } else {
      alert("Fant ingen kommuner i GeoJSON-filen.");
    }
  });
</script>

</body>
</html>
